<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="modal-header">
            <div class="header-side">
                <button class="close-btn">✕</button>
            </div>
            <div class="header-center">
                <img src="./images/Screenshot 2023-07-12 at 17.36.57.png" alt="Twitter Logo" class="twitter-logo-img">
            </div>
            <div class="header-side"></div> </div>

        <h1>Sign in to Twitter</h1>

        <div class="content-box">
            <button class="btn btn-image">
                <img src="./images/Screenshot 2023-07-12 at 17.37.15.png" alt="Google Logo" class="provider-icon">
                Sign in with Google
            </button>
            
            <button class="btn btn-image">
                <img src="./images/Screenshot 2023-07-12 at 17.37.24.png" alt="Apple Logo" class="provider-icon">
                Sign in with Apple
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="input-group">
                <input type="text" placeholder="Phone, email, or username">
            </div>

            <button class="btn btn-next">Next</button>
            <button class="btn">Forgot password?</button>

            <p class="footer-text">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </div>
    </div>
</body>
</html>
