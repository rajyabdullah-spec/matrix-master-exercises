<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raji Al-Abdullah | Interactive Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .hero-section {
            padding: 100px 0;
            background: var(--primary-gradient);
            clip-path: ellipse(150% 100% at 50% 0%);
            margin-bottom: 80px;
        }

       
        .project-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            height: 100%;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-15px) scale(1.02);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .task-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #764ba2;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .card-title {
            color: #1e293b;
            font-weight: 800;
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        .card-desc {
            color: #475569;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        
        .btn-launch {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            margin-top: auto;
            transition: 0.3s;
            box-shadow: 0 10px 20px -10px #764ba2;
        }

        .btn-launch:hover {
            color: white;
            transform: shadow(0 15px 25px -5px #764ba2);
            filter: brightness(1.1);
        }

        
        .future-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .future-card .card-title { color: #94a3b8; }
    </style>
</head>
<body>

<header class="hero-section text-center shadow-lg">
    <div class="container">
        <h1 class="display-2 fw-bolder mb-3">Dev Journey</h1>
        <p class="fs-4 opacity-75">Visualizing my growth as a Full-Stack Developer</p>
    </div>
</header>

<div class="container mb-5">
    <div class="row g-4">
        <script>
            // مصفوفة المشاريع: يمكنك إضافة أي عدد هنا وسيتحدث الموقع تلقائياً
            const myWork = [
                { id: "01", name: "HTML Code Formatting", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Fix-Indentation.html", desc: "Improving HTML readability by organizing code structure and fixing indentation to meet professional standards." },
                { id: "02", name: "HTML Code Validation", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Code-Validation.html", desc: "Identifying and fixing syntax errors in HTML code to ensure it meets W3C web standards and functions correctly across all browsers." },
                { id: "03", name: "Personal Website Foundations", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Your-first-website.html", desc: "Building a personal website from scratch using essential HTML elements, including navigation lists, data tables, and interactive forms to practice semantic structure." },
                { id: "04", name: "Layout Repair & Box Model", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/The Evil Hacker/index.html", desc: "Reconstructing a website layout using CSS Box Model and Display properties. The goal was to precisely position elements and manage spacing without using floats." },
                { id: "05", name: "Classic Google UI Clone", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Google/index.html", desc: "Recreating the iconic 1998 Google interface using HTML and CSS. This task focused on precise layout replication, image handling, and cross-browser validation." },
                { id: "06", name: "Twitter Login UI Redesign", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Twitter/index.html", desc: "Developing a modern, responsive login page for Twitter using HTML and CSS. The project focuses on UI replication, logo integration, and meeting strict deployment deadlines." },
                { id: "07", name: "Legacy Airbnb UI Clone", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/AirBNB/index.html", desc: "Recreating the 2009 Airbnb landing page using a fixed-width layout. This project focused on advanced positioning using the CSS display property and practicing deployment via GitHub." },
                { id: "08", name: "Craigslist Legacy Layout", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Craigslist/index.html", desc: "Building a 'timeless' multi-column layout with a 1000px fixed width. This task emphasized structured content organization using various CSS display properties and manual layout design." },
                { id: "09", name: "Front-End Demo Challenge", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Demo-Challenge-paypal2002/index.html", desc: "Recreating the original 2001 PayPal landing page. This task focuses on building complex layouts with clean HTML and CSS, following strict coding guidelines and time constraints." },
                { id: "010", name: "Legacy LinkedIn Login UI", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Front-End-Challenge-Linkedin/index.html", desc: "A time-bound challenge to replicate the 2008 LinkedIn login page. It focuses on clean code structure, semantic HTML, and professional CSS styling while following strict industry guidelines." },
                { id: "011", name: "Responsive Design with Materialize CSS", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/The Materialize/index.html", desc: "A time-bound challenge to replicate the 2008 LinkedIn login page. It focuses on clean code structure, semantic HTML, and professional CSS styling while following strict industry guidelines." },
                { id: "012", name: "Personal Site UI with Bootstrap", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Time-to-Bootstrap/index.html", desc: "Modernizing a personal website by integrating the Bootstrap framework. The project focuses on a mobile-first approach, using its grid system and pre-built components to enhance layout and styling instantly." },
                { id: "013", name: "Framework-Powered Personal Site", path: "https://rajyabdullah-spec.github.io/matrix-master-exercises/Assignment/Your-first-website-with-Framework/index.html", desc: "Redesigning an existing personal website using the Bootstrap framework. The project focused on implementing a mobile-first grid system and modern UI components to achieve a professional and responsive layout." },



                // أضف الـ 15 مهمة هنا بنفس الطريقة...
            ];

            // توليد المشاريع الحالية
            myWork.forEach(p => {
                document.write(`
                <div class="col-md-6 col-lg-4">
                    <div class="project-card">
                        <span class="task-tag">Mission #${p.id}</span>
                        <h3 class="card-title">${p.name}</h3>
                        <p class="card-desc">${p.desc}</p>
                        <a href="${p.path}" class="btn-launch">Launch Project</a>
                    </div>
                </div>`);
            });

            // توليد كروت احتياطية ذكية (تلقائية حتى رقم 25)
            for(let i = myWork.length + 1; i <= 25; i++) {
                document.write(`
                <div class="col-md-6 col-lg-4">
                    <div class="project-card future-card">
                        <span class="task-tag" style="color: #64748b">Mission #${i.toString().padStart(2, '0')}</span>
                        <h3 class="card-title">Encrypted Lab</h3>
                        <p class="card-desc" style="color: #64748b">Content hidden until skills are unlocked. Stay tuned for the next sprint.</p>
                        <button class="btn btn-outline-light disabled w-100 border-0 opacity-25">Locked Access</button>
                    </div>
                </div>`);
            }
        </script>
    </div>
</div>

<footer class="text-center py-5 border-top border-secondary">
    <p class="mb-0 text-secondary">&copy; 2026 Raji Al-Abdullah | Engineered with Passion</p>
</footer>

</body>
</html>
