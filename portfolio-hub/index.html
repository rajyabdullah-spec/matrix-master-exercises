<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raji Al-Abdullah | Interactive Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero-section text-center shadow-lg">
    <div class="container">
        <h1 class="display-2 fw-bolder mb-3">Dev Journey</h1>
        <p class="fs-4 opacity-75">Visualizing my growth as a Full-Stack Developer</p>
    </div>
</header>

<div class="container mb-4">
    <div class="row g-3 justify-content-center">
        <div class="col-sm-6 col-md-4">
            <div class="stats-box text-center shadow-sm">
                <span class="stats-icon">🚀</span>
                <div class="stats-value" id="assignments-count">0</div>
                <div class="stats-label">Assignments Completed</div>
            </div>
        </div>
        <div class="col-sm-6 col-md-4">
            <div class="stats-box text-center shadow-sm highlight">
                <span class="stats-icon">💡</span>
                <div class="stats-value" id="algorithms-count">0</div>
                <div class="stats-label">Algorithms Solved</div>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-input" placeholder="Search challenges or projects by name, description, keywords...">
                <span class="search-clear" id="search-clear-btn" style="display: none;">&times;</span>
            </div>
        </div>
    </div>
</div>

<div class="container text-center mb-5">
    <div class="tab-container shadow-sm">
        <button type="button" class="tab-btn active" id="show-html">🎨 HTML & CSS Projects</button>
        <button type="button" class="tab-btn" id="show-js">⚡ JavaScript Labs</button>
        <button type="button" class="tab-btn" id="show-algo">🧠 Algorithm Lab</button>
        <button type="button" class="tab-btn" id="show-ajax">🌐 AJAX & API Apps</button>
        <button type="button" class="tab-btn" id="show-react">⚛️ React.js Architecture</button>
        <button type="button" class="tab-btn" id="show-backend">🎛️ Backend Engines</button>
    </div>
</div>

<div class="container mb-5">
    <div id="content-display">
        <div class="row g-4" id="projects-grid"></div>
    </div>
</div>

<footer class="footer text-center text-muted py-4">
    <div class="container">
        <p class="custom-copyright text-center">&copy; 2026 Raji Al-Abdullah. All rights reserved.</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
